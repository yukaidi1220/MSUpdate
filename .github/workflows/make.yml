name: MSUpdate
run-name: Make MSUpdate ${{ inputs.makeversion }} by @${{ github.actor }} ${{ inputs.UpdateFromUUP == true && '- UUP' || '' }} ${{ inputs.MultiEdition == true && '- Multi' || ''}} ${{ inputs.SkipCheck == true && '- SkipCheck' || ''}}
on:
  workflow_dispatch:
    inputs:
      makeversion:
        description: "选择制作的系统版本"
        required: true
        type: choice
        options:
          - w1126h164
          # - w1126h1a64  # ARM64
          - w1125h264
          # - w1125h2a64  # ARM64
          - w1123h264
          # - w1123h2a64  # ARM64
          - w1022h264
          # - w1022h2a64  # ARM64
          # - w1022h232   # X86
          - w11lt2464
          # - w11lt24a64  # ARM64
          - w10lt2164
          # - w10lt2132   # X86
          - w10lt1964
          # - w10lt1932   # X86
          - w10lt1664
          # - w10lt1632   # X86
      UpdateFromUUP:
        description: "从UUPDUMP获取更新(1809+)"
        required: false
        default: true
        type: boolean
      MultiEdition:
        description: "转换多版本(LTSC勿选)"
        required: false
        default: true
        type: boolean
      SkipCheck:
        description: "跳过硬件检测(Win11)"
        required: false
        default: false
        type: boolean

jobs:
  msupdate:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # - name: Change DNS Server
      #   shell: pwsh
      #   run: |
      #     $newDnsServers = @('1.1.1.1', '8.8.8.8')
      #     $networkAdapters = Get-NetAdapter | Where-Object { $_.Status -eq 'Up' }
      #     foreach ($adapter in $networkAdapters) {
      #          try {
      #             Set-DnsClientServerAddress -InterfaceIndex $adapter.ifIndex -ResetServerAddresses
      #             Set-DnsClientServerAddress -InterfaceIndex $adapter.ifIndex -ServerAddresses $newDnsServers
      #         } catch {
      #             Write-Host "为适配器 $($adapter.Name) 设置 DNS 失败: $_"
      #         }
      #     }
      #     ipconfig /flushdns

      # - name: Install Cloudflare WRAP
      #   shell: pwsh
      #   run: |
      #     Write-Host "正在安装 Cloudflare WARP..."
      #     Invoke-WebRequest -Uri "https://1111-releases.cloudflareclient.com/win/latest" -OutFile "C:\cfwarp.msi"
      #     Start-Process "msiexec.exe" -ArgumentList "/i C:\cfwarp.msi /qn" -Wait
      #     . "C:\Program Files\Cloudflare\Cloudflare WARP\warp-cli.exe" registration new
      #     . "C:\Program Files\Cloudflare\Cloudflare WARP\warp-cli.exe" connect
      #     # 添加循环等待连接状态
      #     for ($attemptCount = 0; $attemptCount -lt 10; $attemptCount++) {
      #         $output = . "C:\Program Files\Cloudflare\Cloudflare WARP\warp-cli.exe" status
      #         Write-Host $output
      #         if ($output -like "*Status update: Connected*") {
      #             break
      #         }
      #         Start-Sleep -Seconds 5  # 等待5秒后再次检查
      #     }
      #     if ($attemptCount -eq 10) {
      #         Write-Host "10次尝试后连接失败。"
      #         exit 1  # 以错误码退出
      #     }

      - name: Pre-check rclone
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/rclone-action
          token: ${{ secrets.RCLONE_TOKEN }}
          path: _rclone_check

      - name: Verify rclone config
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path "_rclone_check\rclone.conf")) {
            throw "rclone.conf 未找到"
          }
          if (-not (Test-Path "_rclone_check\rclone.exe")) {
            Write-Host "未找到 rclone，正在下载..."
            Invoke-WebRequest -Uri 'https://downloads.rclone.org/rclone-current-windows-amd64.zip' -OutFile '_rclone_check\rclone.zip'
            Expand-Archive -Path '_rclone_check\rclone.zip' -DestinationPath '_rclone_check\' -Force
            Copy-Item -Path '_rclone_check\rclone-*-windows-amd64\rclone.exe' -Destination '_rclone_check\rclone.exe'
          }
          Write-Host "正在验证 rclone 配置和 RCLONE_PATH..."
          Write-Host "RCLONE_PATH = ${{ vars.RCLONE_PATH }}"
          & _rclone_check\rclone.exe --config _rclone_check\rclone.conf lsd "${{ vars.RCLONE_PATH }}"
          if ($LASTEXITCODE -ne 0) {
            throw "rclone lsd 失败，请检查 RCLONE_PATH 和 rclone.conf"
          }
          Write-Host "rclone 配置验证通过！" -ForegroundColor Green

      - name: 网络信息检查
        shell: bash
        continue-on-error: true
        run: |
          echo "=== 网络信息 ==="

          # Azure IMDS 获取区域
          METADATA=$(curl -sS -H "Metadata:true" \
            "http://169.254.169.254/metadata/instance?api-version=2021-02-01" \
            --max-time 2 2>/dev/null) || true
          if [ -n "$METADATA" ]; then
            AZURE_LOCATION=$(echo "$METADATA" | jq -r '.compute.location // "未知"')
            VM_SIZE=$(echo "$METADATA" | jq -r '.compute.vmSize // "未知"')
            echo "Azure 区域: $AZURE_LOCATION"
            echo "VM 大小: $VM_SIZE"
          else
            echo "Azure 区域: 不可用"
          fi

          # 获取 IPv4
          IPV4=$(curl -sS "https://4.itdog.cn" --max-time 5 2>/dev/null) || true
          echo "IPv4: ${IPV4:-获取失败}"

          # 获取 IP 归属地
          GEO=$(curl -sS "https://myip.ipip.net/json" --max-time 5 2>/dev/null) || true
          if [ -n "$GEO" ]; then
            RET=$(echo "$GEO" | jq -r '.ret // "fail"')
            if [ "$RET" = "ok" ]; then
              LOCATION=$(echo "$GEO" | jq -r '.data.location // [] | join(" ")')
              echo "归属地: $LOCATION"
            else
              echo "归属地: 获取失败"
            fi
          else
            echo "归属地: 获取失败"
          fi

      - name: Big Task
        shell: pwsh
        run: |
          $MakeVersion   = [string] "${{ inputs.MakeVersion }}"
          $UpdateFromUUP = [bool]   $${{ inputs.UpdateFromUUP }}
          $MultiEdition  = [bool]   $${{ inputs.MultiEdition }}
          $SkipCheck     = [bool]   $${{ inputs.SkipCheck }}
          .\msupdate.ps1

      # - name: Disconnect Cloudflare WRAP
      #   shell: pwsh
      #   run: |
      #     if (Test-Path "C:\Program Files\Cloudflare\Cloudflare WARP\warp-cli.exe") {
      #         try {
      #             . "C:\Program Files\Cloudflare\Cloudflare WARP\warp-cli.exe" disconnect
      #         }
      #         catch {
      #             Write-Warning "断开 Cloudflare WARP 失败"
      #         }
      #     }

      - name: Get rclone Config
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/rclone-action
          token: ${{ secrets.RCLONE_TOKEN }}
          path: bin

      - name: Upload ISO to OneDrive
        shell: pwsh
        run: |
          # 安装依赖
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path -Path ".\bin\rclone.conf")) {
              throw "未找到 rclone 配置文件"
          }
          if (-not (Test-Path -Path ".\bin\rclone.exe")) {
            Write-Host "未找到 rclone，正在下载..."
            Invoke-WebRequest -Uri 'https://downloads.rclone.org/rclone-current-windows-amd64.zip' -outfile .\temp\rclone.zip
            Expand-Archive -Path .\temp\rclone.zip -DestinationPath .\temp\ -Force
            Copy-Item -Path .\temp\rclone-*-windows-amd64\rclone.exe -Destination .\bin\rclone.exe
          }
          # 上传到云端
          Get-ChildItem -Path ".\*.json" -File | ForEach-Object {
            # 读取 json
            $json = Get-Content $_.FullName | Convertfrom-Json

            if (-not (Test-Path ".\$($json.name)")) {
              throw "未找到文件！"
            }
            
            # 上传 iso
            
            Write-Host "正在上传 $(Resolve-Path $json.name) 到 ${{ vars.RCLONE_PATH }}\$($json.os_ver)\$($json.os_release)\$($json.os_version)..."
            .\bin\rclone.exe copy "$(Resolve-Path $json.name)" "${{ vars.RCLONE_PATH }}\$($json.os_ver)\$($json.os_release)\$($json.os_version)" --progress --onedrive-chunk-size 250M

            # 上传 json
            Write-Host "正在上传 $(Resolve-Path $_.FullName) 到 ${{ vars.RCLONE_PATH }}\$($json.os_ver)\$($json.os_release)\$($json.os_version)..."
            .\bin\rclone.exe copy "$(Resolve-Path $_.FullName)" "${{ vars.RCLONE_PATH }}\$($json.os_ver)\$($json.os_release)\$($json.os_version)" --progress

            # 上传非跳过检测的最新版本 json
            if ($json.msupdate.skipcheck -ne $true) {
              Write-Host "正在上传 $(Resolve-Path $_.FullName) 到 ${{ vars.RCLONE_PATH }}\$($json.os_ver)\$($json.os_release)\latest_$($json.os_arch).json..."
              .\bin\rclone.exe copyto "$(Resolve-Path $_.FullName)" "${{ vars.RCLONE_PATH }}\$($json.os_ver)\$($json.os_release)\latest_$($json.os_arch).json" --progress
            }
          }
